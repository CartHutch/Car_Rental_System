<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental</title>
    <link rel="stylesheet" href="./index_style.css">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  </head>
  <body>
    <main>
      <div class="left">
        <img src="./logo.png" alt="Company Logo" class="logo">
        <h1>Rentals</h1>
        <p>We connect drivers with the best car rental options in one place, helping you find the right car at the right price, fast.</p>
        <a href="#" class="LoginButton">Login</a>
      </div>

      <div class="right">
        <svg style="position:absolute;width:0;height:0" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="customShape" clipPathUnits="userSpaceOnUse">
              <path d="
                M 0 25
                L 0 255
                Q 0 280 25 280
                L 175 280
                Q 200 280 200 305
                L 200 455
                Q 200 480 225 480
                L 415 480
                Q 440 480 456 461
                L 584 300
                Q 600 280 600 255
                L 600 25
                Q 600 0 575 0
                L 25 0
                Q 0 0 0 25
                Z
              "/>
            </clipPath>
          </defs>
        </svg>

        <div class="video-wrap">
          <video autoplay muted loop playsinline src="carvideo.mp4"></video>
        </div>
      </div>

    </main>
    <script src="index_script.js"></script>
  </body>
</html>
