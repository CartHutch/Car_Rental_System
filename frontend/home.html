<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RentalRide</title>
  <link rel="stylesheet" href="home_style.css">
  <link rel="icon" href="./favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="site-header">
    <img src="./logo.png" alt="RentalRide" class="logo">

    <nav class="tab-nav" role="tablist">
      <button class="tab-btn active" data-tab="browse" role="tab" aria-selected="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Browse Cars
      </button>
      <button class="tab-btn" data-tab="reserve" role="tab" aria-selected="false">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Reserve a Car
      </button>
    </nav>

    <button class="btn-logout" id="logoutBtn">Logout</button>
  </header>

  <!-- TAB 1 — BROWSE CARS -->
  <section id="tab-browse" class="tab-panel active" role="tabpanel">
    <div class="filter-bar">
      <form class="filter-form" id="filterForm">
        <input  class="form-input filter-input"
                type="text"
                id="searchModel"
                placeholder="Search by model…"
                autocomplete="off">

        <select class="form-input filter-select" id="filterType">
          <option value="">All Types</option>
          <option value="SUV">SUV</option>
          <option value="Sedan">Sedan</option>
          <option value="Truck">Truck</option>
          <option value="Van">Van</option>
          <option value="Electric">Electric</option>
          <option value="Convertible">Convertible</option>
        </select>

        <select class="form-input filter-select" id="filterSeats">
          <option value="">Any Seats</option>
          <option value="2">2 Seats</option>
          <option value="4">4 Seats</option>
          <option value="5">5 Seats</option>
          <option value="7">7 Seats</option>
          <option value="8">8 Seats</option>
        </select>

        <button class="btn-submit filter-btn" type="submit">Search</button>
        <button class="btn-clear"            type="button" id="clearFilters">Clear</button>
      </form>
    </div>

    <p class="results-count" id="resultsCount"></p>

    <div class="car-grid" id="carGrid">
      <div class="grid-loading" id="gridLoading">
        <div class="spinner"></div>
        <p>Loading available cars…</p>
      </div>
    </div>

  </section>

  <!-- TAB 2 — RESERVE A CAR -->
  <section id="tab-reserve" class="tab-panel" role="tabpanel">

    <div class="reserve-wrapper">
      <div class="reserve-card">

        <div class="reserve-header">
          <h2 class="reserve-title">Make a Reservation</h2>
          <p class="reserve-subtitle">Fill in the details below to book your car.</p>
        </div>

        <div class="selected-car-banner" id="selectedCarBanner" hidden>
          <span class="banner-label">Selected car</span>
          <strong id="selectedCarName"></strong>
          <button type="button" class="banner-clear" id="clearCarBtn">✕ Clear</button>
        </div>

        <form class="form-container" id="reserveForm" novalidate>

          <div class="form-group">
            <label class="form-label" for="res-carId">Car ID</label>
            <input class="form-input" type="text" id="res-carId"
                   placeholder="e.g. 12  (auto-filled from Browse tab)" required>
            <span class="field-msg" id="carId-msg"></span>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="res-pickup-date">Pick-Up Date</label>
              <input class="form-input" type="date" id="res-pickup-date" required>
              <span class="field-msg" id="pickupDate-msg"></span>
            </div>
            <div class="form-group">
              <label class="form-label" for="res-return-date">Return Date</label>
              <input class="form-input" type="date" id="res-return-date" required>
              <span class="field-msg" id="returnDate-msg"></span>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="res-pickup-loc">Pick-Up Location</label>
              <input class="form-input" type="text" id="res-pickup-loc"
                     placeholder="e.g. Toronto Pearson Airport" required>
              <span class="field-msg" id="pickupLoc-msg"></span>
            </div>
            <div class="form-group">
              <label class="form-label" for="res-return-loc">Return Location</label>
              <input class="form-input" type="text" id="res-return-loc"
                     placeholder="e.g. Downtown Ottawa" required>
              <span class="field-msg" id="returnLoc-msg"></span>
            </div>
          </div>

          <div class="cost-estimate" id="costEstimate" hidden>
            <div class="cost-row">
              <span>Duration</span>
              <strong id="estimateDays">—</strong>
            </div>
            <div class="cost-row">
              <span>Rate</span>
              <strong id="estimateRate">—</strong>
            </div>
            <div class="cost-row cost-total">
              <span>Estimated Total</span>
              <strong id="estimateTotal">—</strong>
            </div>
          </div>

          <div class="form-message" id="reserve-msg"></div>

          <button class="btn-submit btn-submit--full" type="submit" id="reserve-btn"
                  data-label="Confirm Reservation">
            Confirm Reservation
          </button>

        </form>

      </div>
    </div>

  </section>

  <script src="api.js"></script>
  <script src="home_script.js"></script>
</body>
</html>
